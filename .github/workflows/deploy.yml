# Деплой статического сайта на GitHub Pages при пуше в main.
# При первом запуске нужно один раз в Settings → Pages выбрать
# Source: "GitHub Actions". После этого всё работает само.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Возможность запускать вручную из вкладки Actions
  workflow_dispatch:

# Права, нужные GitHub-у чтобы публиковать
permissions:
  contents: read
  pages: write
  id-token: write

# Если запушим много раз подряд, отменяем предыдущие деплои
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
